<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GONÇALVES — Fluxo Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#090A0D;--surface:#0F1117;--card:#151820;--border:#1E2130;
  --gold:#F5B800;--gold-dim:rgba(245,184,0,.12);--gold-b:rgba(245,184,0,.28);
  --txt:#E8EAF0;--txt-dim:#6B7280;--txt-mid:#9CA3AF;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden;}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;}
.tb-logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--gold);white-space:nowrap;}
.tb-sep{color:var(--border);font-size:18px;}
.tb-sw{position:relative;flex:1;max-width:280px;}
.tb-s{width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;
  color:var(--txt);font-size:12px;padding:6px 10px 6px 30px;outline:none;font-family:'DM Sans',sans-serif;}
.tb-s:focus{border-color:var(--gold);}
.tb-si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txt-dim);font-size:13px;pointer-events:none;}
.tb-f{background:var(--card);border:1px solid var(--border);border-radius:6px;
  color:var(--txt);font-size:11px;padding:5px 9px;outline:none;font-family:'DM Sans',sans-serif;}
.tb-f:focus{border-color:var(--gold);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:7px;}
.bsm{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--txt-dim);
  padding:5px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.bsm:hover{border-color:var(--gold);color:var(--gold);}
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;height:calc(100vh - 52px);padding:12px;gap:10px;}
.board-wrap::-webkit-scrollbar{height:10px;}
.board-wrap::-webkit-scrollbar-track{background:rgba(255,255,255,.04);border-radius:5px;}
.board-wrap::-webkit-scrollbar-thumb{background:#4B5160;border-radius:5px;border:2px solid var(--bg);}
.board-wrap::-webkit-scrollbar-thumb:hover{background:#6B7280;}
.col{min-width:268px;max-width:268px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:border-color .15s,background .15s;}
.col.dov{border-color:var(--gold);background:rgba(245,184,0,.05);}
.col-hd{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.col-nm{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt);flex:1;}
.col-ct{font-size:10px;color:var(--txt-dim);background:var(--card);padding:2px 7px;border-radius:10px;font-weight:600;}
.badd{background:none;border:none;color:var(--txt-dim);cursor:pointer;font-size:16px;padding:1px;transition:color .15s;display:flex;align-items:center;}
.badd:hover{color:var(--gold);}
.col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px;min-height:60px;}
.col-body::-webkit-scrollbar{width:3px;}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.kcard{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;cursor:grab;transition:all .15s;border-left:3px solid transparent;user-select:none;}
.kcard:hover{border-color:rgba(245,184,0,.3);border-left-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.4);}
.kcard.dragging{opacity:.35;cursor:grabbing;}
.kcard.hidden{display:none;}
.kcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:4px;}
.kcard-code{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.05em;}
.kcard-acomp{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(139,92,246,.15);
  color:#A78BFA;border:1px solid rgba(139,92,246,.3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kcard-cli{font-size:11px;color:var(--txt);font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kcard-route{font-size:10px;color:var(--txt-dim);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kcard-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ktag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap;}
.tg{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-b);}
.tb{background:rgba(59,130,246,.1);color:#3B82F6;border:1px solid rgba(59,130,246,.3);}
.tp{background:rgba(139,92,246,.1);color:#8B5CF6;border:1px solid rgba(139,92,246,.3);}
.kav{width:18px;height:18px;border-radius:4px;background:var(--gold);display:flex;align-items:center;
  justify-content:center;font-size:8px;font-weight:800;color:#111;flex-shrink:0;margin-left:auto;font-family:'Syne',sans-serif;}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;
  backdrop-filter:blur(4px);align-items:flex-start;justify-content:center;overflow-y:auto;padding:14px;}
.mov.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:780px;max-width:100%;margin:auto;box-shadow:0 8px 40px rgba(0,0,0,.7);overflow:hidden;}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);}
.mhl{display:flex;align-items:center;gap:10px;}
.mttl{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--txt);}
.mcod{font-size:12px;color:var(--gold);font-weight:700;background:var(--gold-dim);padding:3px 9px;border-radius:5px;border:1px solid var(--gold-b);}
.mclose{background:none;border:none;color:var(--txt-dim);cursor:pointer;font-size:18px;display:flex;align-items:center;}
.mclose:hover{color:var(--txt);}
.mbody{padding:16px 20px;overflow-y:auto;max-height:72vh;}
.fsec{margin-bottom:16px;}
.fst{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);
  margin-bottom:9px;display:flex;align-items:center;gap:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g3{grid-template-columns:1fr 1fr 1fr;}
.g4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg.full{grid-column:1/-1;}
.fg.sp2{grid-column:span 2;}
.fg label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt-dim);}
.fg input,.fg select,.fg textarea{background:var(--card);border:1px solid var(--border);border-radius:6px;
  color:var(--txt);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;outline:none;transition:border-color .15s;}
.fg input[type="date"]{color-scheme:dark;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg select option{background:var(--card);}
.cod-ok{font-size:10px;color:var(--green);margin-top:3px;display:flex;align-items:center;gap:3px;}
.cod-err{font-size:10px;color:var(--red);margin-top:3px;display:none;align-items:center;gap:3px;font-weight:600;}
.cod-inp-dup{border-color:var(--red)!important;}.vw{position:relative;}
.vw input{width:100%;}
.vdrop{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--gold-b);
  border-radius:6px;z-index:20;max-height:130px;overflow-y:auto;display:none;margin-top:2px;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.vdrop.open{display:block;}
.vitem{padding:7px 10px;font-size:12px;cursor:pointer;color:var(--txt);}
.vitem:hover{background:var(--gold-dim);color:var(--gold);}
.pct-w{position:relative;}
.pct-w input{padding-right:26px;}
.pct-s{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--txt-dim);pointer-events:none;}
.az{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;margin-top:4px;}
.az:hover,.az.dov{border-color:var(--gold);background:var(--gold-dim);}
.az p{font-size:11px;color:var(--txt-dim);margin-top:4px;}
.alist{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.aitem{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;}
.aname{flex:1;font-size:11px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.asz{font-size:10px;color:var(--txt-dim);flex-shrink:0;}
.adl,.arm{background:none;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;flex-shrink:0;}
.adl{color:var(--gold);}
.arm{color:var(--red);}
.mft{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.bprim{background:var(--gold);color:#111;border:none;border-radius:7px;padding:9px 18px;font-size:12px;
  font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;}
.bprim:hover{opacity:.85;}
.bprim:disabled{opacity:.4;cursor:default;}
.bgh{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--txt-dim);
  padding:9px 13px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;}
.bgh:hover{border-color:var(--txt-dim);color:var(--txt);}
.bdng{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:7px;color:var(--red);
  padding:9px 12px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;}
.bdng:hover{background:rgba(239,68,68,.2);}
.mmsg{font-size:11px;color:var(--green);}
.mmsg.err{color:var(--red);}
.cfg-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:440px;
  max-width:95vw;margin:auto;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.cfg-box h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:13px;color:var(--txt);}
.cfgr label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt-dim);display:block;margin-bottom:4px;}
.cfgr input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;
  color:var(--txt);font-size:12px;padding:7px 9px;outline:none;margin-bottom:10px;font-family:'DM Sans',sans-serif;}
.cfgr input:focus{border-color:var(--gold);}
.spinner{width:14px;height:14px;border:2px solid rgba(245,184,0,.2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.prev-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center;padding:16px;}
.prev-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:min(860px,96vw);max-height:92vh;overflow:hidden;display:flex;flex-direction:column;}
.prev-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.prev-hd span{font-size:12px;font-weight:600;color:var(--txt);}
.prev-body{flex:1;overflow:auto;padding:12px;display:flex;align-items:center;justify-content:center;min-height:200px;}
.empty-col{font-size:11px;color:var(--txt-dim);text-align:center;padding:16px 0;opacity:.5;}
</style>
</head>
<body style="display:flex;flex-direction:column;">

<div class="topbar">
  <div class="tb-logo">GON</div>
  <span class="tb-sep">|</span>
  <div class="tb-sw">
    <i class="ti ti-search tb-si"></i>
    <input class="tb-s" id="tb-s" placeholder="Buscar código, cliente, motorista..." oninput="doFilter()">
  </div>
  <select class="tb-f" id="f-vend" onchange="doFilter()">
    <option value="">Todos os vendedores</option>
  </select>
  <div class="tb-r">

    <button class="bsm" id="btn-ref" onclick="loadData()">
      <i class="ti ti-refresh" style="font-size:12px"></i> Atualizar
    </button>
  </div>
</div>

<div class="board-wrap" id="board">
  <div style="margin:auto;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--txt-dim);">
    <div class="spinner" style="width:24px;height:24px;border-width:3px;"></div>
    <span style="font-size:12px;">Carregando...</span>
  </div>
</div>

<div class="mov" id="card-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhd">
      <div class="mhl">
        <span class="mttl" id="mttl">Novo Card</span>
        <span class="mcod" id="mcod" style="display:none"></span>
      </div>
      <button class="mclose" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mft">
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="bdng" id="btn-del" onclick="deleteCard()" style="display:none">
          <i class="ti ti-trash" style="font-size:12px"></i> Excluir
        </button>
        <span class="mmsg" id="mmsg"></span>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="bgh" onclick="closeModal()">Cancelar</button>
        <button class="bprim" id="btn-sv" onclick="saveCard()">
          <i class="ti ti-device-floppy" style="font-size:13px"></i> Salvar
        </button>
      </div>
    </div>
  </div>
</div>



<script>
var ABA="GONCALVES", PFX="G", SK="jira_url_GONCALVES", ATK="att_GON_", EXTK="extra_GON_";
var STATUS_LIST=["OPERACIONAL","COLETA","AGUARDANDO MANIFESTO","FATURADO","MANIFESTOS","FINALIZADO"];
var SC={"OPERACIONAL":"#3B82F6","COLETA":"#F59E0B","AGUARDANDO MANIFESTO":"#8B5CF6","FATURADO":"#F5B800","MANIFESTOS":"#EC4899","FINALIZADO":"#22C55E"};
var AO=["","EM ROTA DE COLETA","AGUARDANDO CARREGAMENTO","CARREGANDO","EM ROTA DE ENTREGA","DESCARREGANDO","CONCLUIDO","NECESSARIO TRANSBORDO","RETOMAR CONTRATAÇÃO","SEM CONTATO"];

// Field map: chave do dado → id do elemento HTML
// As chaves DEVEM bater exatamente com os cabeçalhos da planilha Google Sheets
var FM={
  // ── Campos que já existem na planilha (nomes exatos da linha 1)
  "Chave":          "fi_dt_codigo",   // coluna A — mesmo valor do DT CODIGO
  "Resumo":         "fi_resumo_hid",  // coluna B — gerado no saveCard, sem input
  "Responsável":    "fi_responsavel", // coluna C
  "Status":         "fi_status",      // coluna D
  "ACOMPANHAMENTO": "fi_acomp",       // coluna E
  "DATA DA COLETA": "fi_data_col",    // coluna F
  "CLIENTE":        "fi_cliente",     // coluna G
  "CONTATO CLIENTE":"fi_contato",     // coluna H
  "VENDEDOR":       "fi_vendedor",    // coluna I
  "DT CODIGO":      "fi_dt_codigo",   // coluna J
  "FRETE COBRADO":  "fi_fr_cli",      // coluna K  ← era "FRETE CLIENTE"
  "FRETE PAGO":     "fi_fr_mot",      // coluna L  ← era "FRETE MOTORISTA"
  "TIPO DE VEICULO":"fi_veiculo",     // coluna M
  "MOTORISTA":      "fi_motor",       // coluna N
  "GERENCIAMENTO":  "fi_gerenc",      // coluna O
  "PREVISÃO DE ENTREGA":"fi_prev_ent",// coluna P  ← era "PREVISAO DA ENTREGA"
  "DATA DA ENTREGA":"fi_data_ent",    // coluna Q
  "UF ORIGEM":      "fi_uf_orig",     // coluna R
  "CUSTO OPERACIONAL TOTAL":"fi_custo",// coluna S ← era "CUSTO TOTAL OPERACIONAL"

  // ── Campos extras do form que precisam de colunas na planilha
  "CNPJ TOMADOR":       "fi_cnpj_tom",
  "CTE":                "fi_cte",
  "NF":                 "fi_nf",
  "CIDADE ORIGEM":      "fi_cid_orig",
  "CIDADE DESTINO":     "fi_cid_dest",
  "UF DESTINO":         "fi_uf_dest",
  "ADIANTAMENTO":       "fi_adiant",
  "TITULAR DA CONTA":   "fi_titular",
  "TIPO CHAVE PIX":     "fi_tipo_pix",
  "CHAVE PIX":          "fi_pix",
  "BANCO":              "fi_banco",
  "TELEFONE MOTORISTA": "fi_tel_mot",
  "TITULO":             "fi_titulo",
  "OBSERVACAO":         "fi_obs"
};
function fid(k){return FM[k]||("fi_"+k.replace(/\s+/g,"_").toLowerCase());}
function fval(k){var e=document.getElementById(fid(k));return e?e.value.trim():"";}
function fset(k,v){var e=document.getElementById(fid(k));if(e){if(e.type==="date")e.value=toBR_inv(v);else e.value=v||"";}}

// Date helpers: sheet = dd/MM/yyyy, input[type=date] = yyyy-MM-dd
function toBR_inv(s){
  if(!s)return "";
  // dd/MM/yyyy → yyyy-MM-dd
  var p=String(s).split("/");
  if(p.length===3&&p[2].length===4)return p[2]+"-"+p[1]+"-"+p[0];
  // already yyyy-MM-dd?
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return "";
}
function fromDateInp(s){
  if(!s)return "";
  // yyyy-MM-dd → dd/MM/yyyy
  var p=String(s).split("-");
  if(p.length===3)return p[2]+"/"+p[1]+"/"+p[0];
  return s;
}

var WEBAPP_URL=localStorage.getItem(SK)||"";
var allCards=[],editKey=null,vendedores=[],pendAtt=[],driveAtts=[];
// ── getExtra / saveExtra — compatibilidade com dados antigos
function getExtra(key) {
  try { return JSON.parse(localStorage.getItem(EXTK+key)||"{}"); } catch(e) { return {}; }
}
function saveExtra(key, dados) {
  try { localStorage.setItem(EXTK+key, JSON.stringify(dados)); } catch(e) {}
}


document.addEventListener("DOMContentLoaded",function(){
  loadData();
});



async function loadData(){
  var btn=document.getElementById("btn-ref");
  btn.innerHTML="<span class=\"spinner\"></span>";
  try{
    var r=await fetch(WEBAPP_URL+"?aba="+encodeURIComponent(ABA));
    var j=await r.json();
    if(!j.success)throw new Error(j.error);
    allCards=j.rows;
    // rebuild vendedores list
    var vs={};
    allCards.forEach(function(c){if(c["VENDEDOR"])vs[c["VENDEDOR"]]=1;});
    try{JSON.parse(localStorage.getItem("vend_GON")||"[]").forEach(function(v){vs[v]=1;});}catch(e){}
    vendedores=Object.keys(vs).sort();
    var sel=document.getElementById("f-vend"),cur=sel.value;
    sel.innerHTML="<option value=\"\">Todos os vendedores</option>"+
      vendedores.map(function(v){return "<option value=\""+e(v)+"\""+(v===cur?" selected":"")+">"+v+"</option>";}).join("");
    renderBoard();
  }catch(ex){
    
    document.getElementById("board").innerHTML="<div style=\"padding:40px;color:var(--red);font-size:13px;margin:auto;text-align:center\">"+
      "<i class=\"ti ti-plug-off\" style=\"font-size:32px;display:block;margin-bottom:12px\"></i>"+
      "Erro: "+ex.message+"</div>";
  }
  btn.innerHTML="<i class=\"ti ti-refresh\" style=\"font-size:12px\"></i> Atualizar";
}

function doFilter(){
  var q=(document.getElementById("tb-s").value||"").toLowerCase().trim();
  var v=(document.getElementById("f-vend").value||"");
  document.querySelectorAll(".kcard").forEach(function(el){
    var show=(!q||(el.dataset.s||"").toLowerCase().indexOf(q)!==-1)&&(!v||el.dataset.v===v);
    el.classList.toggle("hidden",!show);
  });
  document.querySelectorAll(".col").forEach(function(col){
    var n=col.querySelectorAll(".kcard:not(.hidden)").length;
    var b=col.querySelector(".col-ct");if(b)b.textContent=n;
  });
}

function renderBoard(){
  var h="";
  STATUS_LIST.forEach(function(st){
    var cc=allCards.filter(function(c){return c["Status"]===st;});
    var color=SC[st]||"#888";
    h+="<div class=\"col\" data-status=\""+e(st)+"\" ondragover=\"dov(event)\" ondragleave=\"dlv(event)\" ondrop=\"ddrop(event,\'"+e(st)+"\')\">"+
      "<div class=\"col-hd\"><div class=\"col-dot\" style=\"background:"+color+"\"></div>"+
      "<div class=\"col-nm\">"+st+"</div><span class=\"col-ct\">"+cc.length+"</span>"+

function openEdit(key){
  var card=null;

  for(var i=0;i<allCards.length;i++){
    var c=allCards[i];
    var cod=String(c["DT CODIGO"]||c["Chave"]||"").trim();
    // também tenta extrair o código do campo Resumo (ex: "P26500 - CLIENTE - ...")
    var resumoCod=(c["Resumo"]||"").split(" - ")[0].trim();
    if(cod===k||resumoCod===k){card=c;break;}
  }
  if(!card){console.warn("[openEdit] Card não encontrado:",k,"Total cards:",allCards.length);return;}
  console.log("[openEdit] dados recebidos da planilha:",JSON.stringify(card,null,2));
  editKey=key;

function getFormData(){
  var dados={};
  // Campos sem input real no form — computados em saveCard
  var skipKeys={"Resumo":1,"Chave":1};
  Object.keys(FM).forEach(function(k){
    if(skipKeys[k])return;
    var elId=FM[k];
    // DT CODIGO e Chave compartilham o mesmo input fi_dt_codigo
    var el=document.getElementById(elId);
    if(!el)return;
    if(el.type==="date")dados[k]=fromDateInp(el.value);
    else dados[k]=el.value.trim();
  });
  // Garante fallback de custo
  if(!dados["CUSTO OPERACIONAL TOTAL"]&&dados["FRETE PAGO"])
    dados["CUSTO OPERACIONAL TOTAL"]=dados["FRETE PAGO"];
  var v=dados["VENDEDOR"];
  if(v&&vendedores.indexOf(v)===-1){vendedores.push(v);vendedores.sort();localStorage.setItem("vend_GON",JSON.stringify(vendedores));}
  return dados;
}

async function saveCard(){
  var btn=document.getElementById("btn-sv"),msg=document.getElementById("mmsg");
  var dados=getFormData();
  if(!dados["DT CODIGO"]){msg.textContent="DT Código obrigatório.";msg.className="mmsg err";return;}
  if(!dados["CLIENTE"]){msg.textContent="Cliente obrigatório.";msg.className="mmsg err";return;}
  if(isUsed(dados["DT CODIGO"])){msg.textContent="Código já utilizado!";msg.className="mmsg err";return;}

  // Chave e Resumo (colunas A e B da planilha)
  dados["Chave"]=dados["DT CODIGO"];
  var parts=[dados["DT CODIGO"]];
  if(dados["CTE"])parts.push("CTE "+dados["CTE"]);
  if(dados["NF"])parts.push("NF "+dados["NF"]);
  if(dados["CLIENTE"])parts.push(dados["CLIENTE"]);
  var rota="";
  if(dados["CIDADE ORIGEM"])rota+=dados["CIDADE ORIGEM"]+(dados["UF ORIGEM"]?"/"+dados["UF ORIGEM"]:"");
  if(dados["CIDADE DESTINO"])rota+=(rota?" X ":"")+dados["CIDADE DESTINO"]+(dados["UF DESTINO"]?"/"+dados["UF DESTINO"]:"");
  if(rota)parts.push(rota);
  dados["Resumo"]=parts.join(" - ");

  btn.disabled=true;btn.innerHTML="<span class=\"spinner\"></span> Salvando…";msg.textContent="";
  try{
    var pl=editKey
      ?{action:"update",aba:ABA,chave:editKey,dados:dados}
      :{action:"create",aba:ABA,dados:dados};
    var r=await fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify(pl)});
    var j=await r.json();
    if(!j.success)throw new Error(j.error);
    var ck=editKey||dados["DT CODIGO"];
    saveExtra(ck,dados);
    await saveAtt(ck);
    msg.textContent=editKey?"Atualizado!":"Card "+dados["DT CODIGO"]+" criado!";
    msg.className="mmsg";
    await loadData();
    setTimeout(closeModal,1100);
  }catch(ex){msg.textContent="Erro: "+ex.message;msg.className="mmsg err";}
  btn.disabled=false;btn.innerHTML="<i class=\"ti ti-device-floppy\" style=\"font-size:13px\"></i> Salvar";
}

async function deleteCard(){
  if(!editKey)return;
  if(!confirm("Excluir card "+editKey+"?"))return;
  var msg=document.getElementById("mmsg");
  try{
    var r=await fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify({action:"delete",aba:ABA,chave:editKey})});
    var j=await r.json();if(!j.success)throw new Error(j.error);
    // anexos limpos automaticamente ao excluir card via Drive
    await loadData();closeModal();
  }catch(ex){msg.textContent="Erro: "+ex.message;msg.className="mmsg err";}
}



function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ── ANEXOS VIA GOOGLE DRIVE ─────────────────────────────────

function carregarAnexosDrive(chave) {
  if (!chave || !WEBAPP_URL) return;
  fetch(WEBAPP_URL + '?action=anexos&chave=' + encodeURIComponent(chave))
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.success) { driveAtts = j.anexos || []; renderAttList();
        try { localStorage.setItem("attcnt_"+chave, JSON.stringify(driveAtts)); } catch(e) {} }
    }).catch(function() {});
}

function renderAttList() {
  var l = document.getElementById("att-list"); if (!l) return;
  var out = "";
  // Mostra anexos do Drive
  for (var i = 0; i < driveAtts.length; i++) {
    var a = driveAtts[i];
    var nm = a.nome || "arquivo";
    var sz = a.size > 1048576 ? (a.size/1048576).toFixed(1)+"MB" : a.size > 1024 ? (a.size/1024).toFixed(0)+"KB" : (a.size||0)+"B";
    var ico = /\.(jpg|jpeg|png|gif|webp)$/i.test(nm) ? "ti-photo" : /\.pdf$/i.test(nm) ? "ti-file-type-pdf" : "ti-file";
    out += "<div class=\"aitem\">"
         + "<i class=\"ti "+ico+"\" style=\"font-size:14px;color:var(--gold);flex-shrink:0\"></i>"
         + "<span class=\"aname\">" + e(nm) + "</span>"
         + "<span class=\"asz\">" + sz + "</span>"
         + "<a href=\"https://drive.google.com/file/d/"+a.id+"/view\" target=\"_blank\" class=\"adl\" style=\"color:#3B82F6\" rel=\"noopener\"><i class=\"ti ti-eye\"></i></a>"
         + "<a href=\""+a.url+"\" download=\""+e(nm)+"\" class=\"adl\"><i class=\"ti ti-download\"></i></a>"
         + "<button class=\"arm\" onclick=\"rmAttDrive(\""+a.id+"\","+i+")\" title=\"Excluir\"><i class=\"ti ti-x\"></i></button>"
         + "</div>";
  }
  // Mostra novos arquivos ainda não enviados
  for (var i = 0; i < pendAtt.length; i++) {
    var a = pendAtt[i];
    var nm = a.name || "arquivo";
    var sz = a.size > 1048576 ? (a.size/1048576).toFixed(1)+"MB" : (a.size/1024).toFixed(0)+"KB";
    var ico = /^image\//i.test(a.type||"") ? "ti-photo" : a.type==="application/pdf" ? "ti-file-type-pdf" : "ti-file";
    out += "<div class=\"aitem\">"
         + "<i class=\"ti "+ico+"\" style=\"font-size:14px;color:#F59E0B;flex-shrink:0\"></i>"
         + "<span class=\"aname\">" + e(nm) + "</span>"
         + "<span class=\"asz\">" + sz + " <em style=\"color:#F59E0B\">(pendente)</em></span>"
         + "<button class=\"arm\" onclick=\"rmAtt("+i+")\" title=\"Remover\"><i class=\"ti ti-x\"></i></button>"
         + "</div>";
  }
  if (!out) out = "<div style=\"color:var(--text-muted);font-size:12px;padding:8px 0\">Nenhum anexo</div>";
  l.innerHTML = out;
}

function getAtt(key) {
  // Lê contagem cacheada por card (salva após carregarAnexosDrive)
  try { return JSON.parse(localStorage.getItem("attcnt_"+key)||"[]"); } catch(e) { return []; }
}

function handleFiles(files) {
  console.log("[handleFiles] arquivos selecionados:", files.length);
  Array.prototype.forEach.call(files, function(f) {
    if (f.size > 10*1048576) { alert("Arquivo " + f.name + " excede 10MB."); return; }
    console.log("[handleFiles] adicionando:", f.name, f.size, f.type);
    pendAtt.push(f);
    renderAttList();
  });
  console.log("[handleFiles] pendAtt total:", pendAtt.length);
}

function rmAtt(i) { pendAtt.splice(i, 1); renderAttList(); }

function rmAttDrive(fileId, i) {
  if (!confirm("Excluir este anexo permanentemente?")) return;
  fetch(WEBAPP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "excluir_anexo", fileId: fileId })
  }).catch(function() {});
  driveAtts.splice(i, 1);
  try { localStorage.setItem("attcnt_"+editKey, JSON.stringify(driveAtts)); } catch(e) {}
  renderAttList();
}

async function saveAtt(key) {
  console.log("[saveAtt] chamado com key:", key, "pendAtt:", pendAtt.length);
  if (!pendAtt.length) { console.log("[saveAtt] nenhum pendente, pulando"); return; }
  if (!key) { console.error("[saveAtt] chave vazia — upload cancelado"); return; }
  var btn = document.getElementById("btn-sv");
  var orig = btn ? btn.innerHTML : "";
  var total = pendAtt.length;
  var erros = [];

  // Envia sequencialmente — Apps Script não suporta chamadas paralelas
  for (var i = 0; i < pendAtt.length; i++) {
    var f = pendAtt[i];
    if (btn) btn.innerHTML = "<span class=\"spinner\"></span> Enviando anexo " + (i + 1) + "/" + total + "…";
    try {
      var base64 = await new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(ev) { resolve(ev.target.result.split(",")[1]); };
        reader.onerror = function() { reject(new Error("Falha ao ler " + f.name)); };
        reader.readAsDataURL(f);
      });
      var r = await fetch(WEBAPP_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "upload_anexo",
          chave: key,
          nome: f.name,
          data: base64,
          mimeType: f.type || "application/octet-stream"
        })
      });
      var j = await r.json();
      console.log('[saveAtt] resposta Drive:', JSON.stringify(j));
      if (j.success && j.anexo) { driveAtts.push(j.anexo);
        try { localStorage.setItem("attcnt_"+key, JSON.stringify(driveAtts)); } catch(e) {} }
      else { console.error('[saveAtt] erro:', j.error); erros.push(f.name); }
    } catch(err) {
      console.error('[saveAtt] erro:', err);
      erros.push(f.name);
    }
    renderAttList();
  }

  pendAtt = [];
  if (btn) btn.innerHTML = orig;
  renderAttList();
  if (erros.length) alert("⚠ Falha ao enviar " + erros.length + " anexo(s): " + erros.join(", "));
}

function closePrev(){var ov=document.getElementById("prev-ov");if(ov)ov.style.display="none";}


// ── DRAG & DROP COLUNAS
function dstart(ev,el){el.classList.add("dragging");ev.dataTransfer.setData("text/plain",el.dataset.key||"");}
function dend(ev){document.querySelectorAll(".kcard.dragging").forEach(function(el){el.classList.remove("dragging");});}
function dov(ev){ev.preventDefault();ev.currentTarget.classList.add("dov");}
function dlv(ev){ev.currentTarget.classList.remove("dov");}
async function ddrop(ev,status){
  ev.preventDefault();ev.currentTarget.classList.remove("dov");
  var key=ev.dataTransfer.getData("text/plain");if(!key)return;
  var card=null;
  for(var i=0;i<allCards.length;i++){if((allCards[i]["DT CODIGO"]||allCards[i]["Chave"])===key){card=allCards[i];break;}}
  if(!card)return;
  card["Status"]=status;
  try{
    await fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify({action:"update",aba:ABA,chave:key,dados:card})});
    renderBoard();
  }catch(ex){console.warn("Erro ao mover card:",ex);}
}

// ── CÓDIGO AUTOMÁTICO
// ── GERAÇÃO DE CÓDIGO
// Formato: [PFX][AA][M][NN]
//   PFX = letra da empresa (P, B, G, S)
//   AA  = ano vigente com 2 dígitos (ex: 26)
//   M   = mês sem zero à esquerda (1-12)
//   NN  = sequência do card no mês, 2 dígitos, começa em 01 e zera todo mês
function genCod(){
  var d=new Date();
  var yy=String(d.getFullYear()).slice(2);   // "26"
  var m=String(d.getMonth()+1);             // "5" (sem zero)
  var prefix=PFX+yy+m;                      // ex: "P265"

  // Filtra cards do mês atual com mesmo prefixo para achar a maior sequência
  var re=new RegExp("^"+prefix+"(\\d{2})$");
  var maxSeq=0;
  allCards.forEach(function(c){
    var cod=(c["DT CODIGO"]||c["Chave"]||"");
    var match=cod.match(re);
    if(match){
      var n=parseInt(match[1],10);
      if(n>maxSeq)maxSeq=n;
    }
  });
  var nextSeq=String(maxSeq+1).padStart(2,"0");
  return prefix+nextSeq;
}
function isUsed(cod){
  if(!cod||editKey===cod)return false;
  for(var i=0;i<allCards.length;i++){if((allCards[i]["DT CODIGO"]||allCards[i]["Chave"])===cod)return true;}
  return false;
}
function checkCod(val){
  var ok=document.getElementById("cod-ok");
  var err=document.getElementById("cod-err");
  var inp=document.getElementById("fi_dt_codigo");
  if(!ok||!err)return;
  var used=isUsed(val);
  ok.style.display=used?"none":"flex";
  err.style.display=used?"flex":"none";
  if(inp)inp.classList.toggle("cod-inp-dup",used);
  // Bloqueia o botão Salvar se código duplicado
  var btn=document.getElementById("btn-sv");
  if(btn)btn.disabled=used;
}

// ── VENDEDOR AUTOCOMPLETE
function onVI(input){
  var q=(input.value||"").toLowerCase();
  var drop=document.getElementById("vdrop");if(!drop)return;
  var matches=vendedores.filter(function(v){return v.toLowerCase().indexOf(q)===0&&v!==input.value;});
  if(!matches.length||!q){drop.classList.remove("open");return;}
  drop.innerHTML=matches.map(function(v){
    return "<div class=\"vitem\" onmousedown=\"selV('"+e(v)+"')\">"+v+"</div>";
  }).join("");
  drop.classList.add("open");
}
function selV(v){
  var inp=document.getElementById(fid("VENDEDOR"));if(inp)inp.value=v;
  closeVD();
}
function closeVD(){var d=document.getElementById("vdrop");if(d)d.classList.remove("open");}

// ── FRETE PAGO → preenche Custo Operacional Total se vazio
function onFretMotBlur(){
  var fm=document.getElementById(fid("FRETE PAGO"));
  var ct=document.getElementById(fid("CUSTO OPERACIONAL TOTAL"));
  if(fm&&ct&&!ct.value.trim())ct.value=fm.value.trim();
}
