<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Início</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#090A0D;--surface:#0F1117;--card:#151820;--card2:#1A1F2E;--border:#1E2130;
  --gold:#F5B800;--gold-dim:rgba(245,184,0,.10);--gold-b:rgba(245,184,0,.25);
  --txt:#E8EAF0;--txt-dim:#6B7280;--txt-mid:#9CA3AF;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;--orange:#F97316;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;overflow-x:hidden}

/* ── LAYOUT ── */
.page{display:grid;grid-template-columns:1fr 260px;grid-template-rows:auto 1fr;gap:16px;padding:16px;height:100vh;overflow:hidden}
.col-main{display:flex;flex-direction:column;gap:16px;overflow:hidden;min-height:0}
.col-side{display:flex;flex-direction:column;gap:14px;overflow-y:auto;overflow-x:hidden}

/* ── HEADER ── */
.header{display:flex;align-items:center;gap:22px;flex-shrink:0}
.header-saudacao{flex:1}
.header-hora{font-size:11px;color:var(--txt-dim)}
.header-nome{font-size:20px;font-weight:700;color:var(--txt);font-family:'Syne',sans-serif;line-height:1.2}
.header-nome span{color:var(--gold)}
.header-data{font-size:11px;color:var(--txt-dim);margin-top:2px}
.header-stats{display:flex;gap:10px}
.hstat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;text-align:right;min-width:100px}
.hstat-val{font-size:18px;font-weight:700;color:var(--gold);font-family:'Syne',sans-serif;line-height:1}
.hstat-lbl{font-size:10px;color:var(--txt-dim);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-hd{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.card-hd-ico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.card-hd-title{font-size:12px;font-weight:600;color:var(--txt);flex:1}
.card-hd-badge{font-size:10px;color:var(--txt-dim);background:var(--surface);padding:2px 8px;border-radius:20px;border:1px solid var(--border)}

/* ── FATURAMENTO ── */
.fat-wrap{flex:1;overflow-y:auto;min-height:0}
.fat-mes-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;position:sticky;top:0;background:var(--card);z-index:1;border-bottom:1px solid var(--border)}
.fat-mes-label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px}
.fat-mes-total{font-size:12px;font-weight:700;color:var(--txt)}
.fat-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(30,33,48,.5);transition:background .1s}
.fat-row:hover{background:rgba(255,255,255,.02)}
.fat-cliente{font-size:12px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.fat-rota{font-size:10px;color:var(--txt-dim);margin-top:1px}
.fat-valor{font-size:12px;font-weight:600;color:var(--txt);text-align:right;white-space:nowrap}
.fat-margem{font-size:10px;text-align:right;white-space:nowrap}
.fat-origem{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;background:rgba(59,130,246,.12);color:#3B82F6;white-space:nowrap}

/* ── HEATMAP ── */
.heatmap-wrap{padding:12px 14px}
.heatmap-legend{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.heatmap-lbl{font-size:10px;color:var(--txt-dim)}
.heatmap-scale{display:flex;gap:3px;align-items:center}
.heatmap-scale span{font-size:9px;color:var(--txt-dim)}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-day{height:28px;border-radius:4px;cursor:pointer;transition:all .15s;position:relative;display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent}
.hm-day:hover{transform:scale(1.15);z-index:2}
.hm-day:hover .hm-tip{display:block}
.hm-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1A1F2E;border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:10px;color:var(--txt);white-space:nowrap;z-index:10;pointer-events:none}
.hm-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.hm-dow-lbl{font-size:9px;color:var(--txt-dim);text-align:center}

/* ── AGENDA ── */
.agenda-item{display:flex;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(30,33,48,.5)}
.agenda-item:last-child{border-bottom:none}
.agenda-hora{font-size:10px;color:var(--txt-dim);width:38px;flex-shrink:0;padding-top:2px;font-weight:500}
.agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.agenda-info{flex:1;min-width:0}
.agenda-titulo{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agenda-sub{font-size:10px;color:var(--txt-dim);margin-top:1px}
.agenda-badge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:2px}

/* ── FEED LATERAL ── */
.feed-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid rgba(30,33,48,.5)}
.feed-item:last-child{border-bottom:none}
.feed-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.feed-info{flex:1;min-width:0}
.feed-titulo{font-size:11px;font-weight:600;color:var(--txt);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.feed-sub{font-size:10px;color:var(--txt-dim);margin-top:2px}
.feed-tempo{font-size:9px;color:var(--txt-dim)}

/* ── SIDE SECTION ── */
.side-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.side-hd{display:flex;align-items:center;gap:7px;padding:10px 12px;border-bottom:1px solid var(--border)}
.side-hd-ico{font-size:14px}
.side-hd-title{font-size:11px;font-weight:600;color:var(--txt);flex:1}
.side-hd-badge{font-size:9px;background:var(--gold);color:#111;padding:1px 6px;border-radius:10px;font-weight:700}
.side-body{padding:10px 12px}
.side-empty{font-size:11px;color:var(--txt-dim);text-align:center;padding:16px 0}

/* ── LOADING ── */
.shimmer{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{border-radius:4px;height:12px;margin-bottom:6px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>

<style>
/* ── TEMA CLARO ─────────────────────────────────────── */
body.tema-claro{--bg:#F0F2F5;--surface:#FFFFFF;--card:#FFFFFF;--card-hover:#F5F7FA;--border:#E2E6ED;--border-light:#EEF1F6;--txt:#111827;--txt-dim:#6B7280;--txt-muted:#9CA3AF;--gold:#D97706;--green:#059669;--blue:#2563EB;--teal:#0D9488;--orange:#EA580C;--red:#DC2626;--purple:#7C3AED;--gold-dim:rgba(217,119,6,.10);}
body.tema-claro .topbar,body.tema-claro .top-bar,body.tema-claro [class*="topbar"],body.tema-claro .tb,body.tema-claro header{background:#111827!important;border-bottom-color:#1F2937!important;}
body.tema-claro .topbar *,body.tema-claro [class*="topbar"] *,body.tema-claro .tb *,body.tema-claro header *{color:#E5E7EB!important;}
body.tema-claro .logo-area img,body.tema-claro .brand-logo img,body.tema-claro img[alt*="arreto"]{filter:brightness(0)!important;}
body.tema-claro .card-section,body.tema-claro .op-row,body.tema-claro .op-card{background:#FFFFFF!important;border-color:#E2E6ED!important;}
</style>
</head>

<script>
// ══════════════════════════════════════════════════
//  URLs
// ══════════════════════════════════════════════════
var URL_REL  = 'https://script.google.com/macros/s/AKfycbx0b9geJN-50h8vQPMyAw5rAD5h4ghOFJrngeCgs29t3sqpaCGGC_b2ih99eYYnZdSDfg/exec';
var URL_CAL  = 'https://script.google.com/macros/s/AKfycbyYMOKvOInjNNHjQGlW5k8mGJ6ydl2NKfOr3HRWKrpFXARXxYSsb-vJF5t71yYG_6k69A/exec';
var URL_LAB  = 'https://script.google.com/macros/s/AKfycbzboBXmOiM6a_eG5veYo7Dk8kqNL9FXT5bD57NXzEx9y5g6MoDoHMmYAf9ceXIkVybb/exec';
var URL_HELP = 'https://script.google.com/macros/s/AKfycbw0s7mrACL2idaSsEqiwHhStonOczR8f6PtEhsbj5FSE7l4f7FraoCGYzjyEwXHiVlo/exec';

var TYPE_COLOR = {evento:'#3B82F6',reuniao:'#8B5CF6',alerta:'#F97316',lembrete:'#F5B800'};
var TYPE_LABEL = {evento:'Evento',reuniao:'Reunião',alerta:'Alerta',lembrete:'Lembrete'};

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  // Usuário
  var user = null;
  try { user = JSON.parse(sessionStorage.getItem('barretos_user') || localStorage.getItem('barretos_user') || '{}'); } catch(e){}

  // Header
  renderHeader(user);
  startClock();

  // Carrega tudo em paralelo
  Promise.all([
    carregarFaturamento(user),
    carregarAgenda(user),
    carregarLab(user),
    carregarHelpdesk(user)
  ]);
});

// ══════════════════════════════════════════════════
//  HEADER
// ══════════════════════════════════════════════════
function renderHeader(user) {
  var nome = user && user.nome ? user.nome.split(' ')[0] : 'Visitante';
  document.getElementById('hdr-nome').textContent = nome;
}

function startClock() {
  var meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  var dias  = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  function tick() {
    var agora = new Date();
    var h = agora.getHours(), m = agora.getMinutes();
    var saud = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
    document.getElementById('hdr-saudacao').textContent = saud;
    document.getElementById('hdr-relogio').textContent  = padZ(h)+':'+padZ(m);
    document.getElementById('hdr-mes-mini').textContent = meses[agora.getMonth()];
    document.getElementById('hdr-dia-mini').textContent = agora.getDate();
    document.getElementById('hdr-diasemana').textContent = dias[agora.getDay()];
  }
  tick();
  setInterval(tick, 30000);
}

// ══════════════════════════════════════════════════
//  FATURAMENTO
// ══════════════════════════════════════════════════
var _db = [];

function _parseBRL(s) {
  if (!s) return 0;
  var v = String(s).replace(/R\$\s*/g,'').trim();
  if (v.includes(',')) v = v.replace(/\./g,'').replace(',','.');
  return parseFloat(v)||0;
}

async function carregarFaturamento(user) {
  try {
    var r = await fetch(URL_REL);
    var j = await r.json();
    _db = j.data || j.rows || [];
    if (!_db.length) {
      document.getElementById('fat-wrap').innerHTML = '<div style="padding:20px;color:var(--txt-dim);font-size:12px;text-align:center">Nenhum dado encontrado.</div>';
      return;
    }
    // Popula select igual ao relatório de vendedor
    var meses = [];
    _db.forEach(function(row){ var m=String(row['Mes']||row['Mês']||'').trim(); if(m && !meses.includes(m)) meses.push(m); });
    meses.sort();
    var agora = new Date();
    var mesAtual = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][agora.getMonth()];
    var sel = document.getElementById('sel-mes');
    sel.innerHTML = meses.map(function(m){
      return '<option value="'+m+'"'+(m===mesAtual?' selected':'')+'>'+m.charAt(0).toUpperCase()+m.slice(1)+'</option>';
    }).join('');
    if (!sel.value && sel.options.length) sel.selectedIndex = sel.options.length-1;
    _renderMes(sel.value);
  } catch(e) {
    document.getElementById('fat-wrap').innerHTML = '<div style="padding:20px;color:var(--txt-dim);font-size:12px;text-align:center"><i class="ti ti-plug-off" style="font-size:24px;display:block;margin-bottom:8px"></i>Erro ao carregar operações.</div>';
  }
}

function filtrarMes(mes) { _renderMes(mes); }

function _renderMes(mes) {
  var doMes = _db.filter(function(r){ return (r['Mes']||r['Mês']||'') === mes; });

  var fat=0, custo=0, icms=0;
  doMes.forEach(function(r){
    fat   += _parseBRL(r['Frete Cobrado']);
    custo += _parseBRL(r['Custo Operacional']);
    icms  += _parseBRL(r['ICMS']);
  });
  var liq    = fat - custo - icms;
  var margem = fat > 0 ? (liq/fat*100) : 0;
  var corMargem = margem >= 25 ? 'var(--green)' : margem >= 15 ? 'var(--gold)' : 'var(--red)';

  document.getElementById('stat-faturamento').textContent = fmtBRL(fat);
  document.getElementById('stat-coletas').textContent     = doMes.length;
  document.getElementById('stat-margem').textContent      = margem.toFixed(1) + '%';
  document.getElementById('stat-margem').style.color      = corMargem;
  document.getElementById('fat-badge').textContent        = doMes.length + ' operações';

  var nomeMes = mes.charAt(0).toUpperCase()+mes.slice(1);
  var html = '<div class="fat-mes-header">'+
    '<span class="fat-mes-label">'+nomeMes+'</span>'+
    '<span style="font-size:10px;color:'+corMargem+'">'+margem.toFixed(1)+'% margem</span>'+
    '<span class="fat-mes-total">'+fmtBRL(fat)+'</span>'+
  '</div>';

  doMes.forEach(function(row) {
    var f  = _parseBRL(row['Frete Cobrado']);
    var cs = _parseBRL(row['Custo Operacional']);
    var ic = _parseBRL(row['ICMS']);
    var lq = f - cs - ic;
    var pct= f > 0 ? (lq/f*100) : 0;
    var cor= pct >= 25 ? 'var(--green)' : pct >= 15 ? 'var(--gold)' : 'var(--red)';
    var origem  = String(row.Origem||'').toUpperCase();
    var cliente = row.Cliente||'—';
    var dtCod   = row['DT Codigo']||'';
    var cidOri  = row['Cidade Origem']||'';
    var cidDes  = row['Cidade Destino']||'';
    html += '<div class="fat-row">'+
      '<div>'+
        '<div class="fat-cliente">'+esc(cliente)+(dtCod?' <span style="font-size:10px;color:#F97316;font-weight:600">#'+esc(dtCod)+'</span>':'')+'</div>'+
        '<div class="fat-rota">'+esc(cidOri)+(cidDes?' \u2192 '+esc(cidDes):'')+'</div>'+
      '</div>'+
      '<div class="fat-origem">'+esc(origem)+'</div>'+
      '<div>'+
        '<div class="fat-valor">'+fmtBRL(f)+'</div>'+
        '<div class="fat-margem" style="color:'+cor+'">'+pct.toFixed(1)+'% margem</div>'+
      '</div>'+
    '</div>';
  });

  document.getElementById('fat-wrap').innerHTML = html;
  renderTop5(_db, mes);
}

// ══════════════════════════════════════════════════
// ══════════════════════════════════════════════════
//  TOP 5 CLIENTES
// ══════════════════════════════════════════════════
function renderTop5(data, mes) {
  var el = document.getElementById('top5-body');
  if (!el) return;
  var rows = mes ? data.filter(function(r){ return (r['Mes']||r['Mês']||'') === mes; }) : data;
  var porCliente = {};
  rows.forEach(function(row) {
    var cli   = row.Cliente||row.cliente||'—';
    var frete = _parseBRL(row['Frete Cobrado']||0);
    var custo = _parseBRL(row['Custo Operacional']||0);
    var icms  = _parseBRL(row['ICMS']||0);
    if (!porCliente[cli]) porCliente[cli] = { fat: 0, liq: 0, ops: 0 };
    porCliente[cli].fat  += frete;
    porCliente[cli].liq  += (frete - custo - icms);
    porCliente[cli].ops  += 1;
  });

  var lista = Object.keys(porCliente).map(function(k) {
    return { nome: k, fat: porCliente[k].fat, liq: porCliente[k].liq, ops: porCliente[k].ops };
  }).sort(function(a,b){ return b.fat - a.fat; }).slice(0,5);

  var maxFat = lista.length ? lista[0].fat : 1;

  el.innerHTML = lista.map(function(c, i) {
    var pct   = c.fat > 0 ? (c.liq/c.fat*100) : 0;
    var cor   = pct >= 25 ? 'var(--green)' : pct >= 15 ? 'var(--gold)' : 'var(--red)';
    var barW  = Math.round(c.fat/maxFat*100);
    var medals = ['🥇','🥈','🥉','4°','5°'];
    return '<div style="padding:8px 0;border-bottom:1px solid rgba(30,33,48,.5)">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<span style="font-size:12px">'+medals[i]+'</span>'+
          '<span style="font-size:11px;font-weight:600;color:var(--txt)">'+esc(c.nome)+'</span>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:11px;font-weight:600;color:var(--txt)">'+fmtBRL(c.fat)+'</div>'+
          '<div style="font-size:9px;color:'+cor+'">'+pct.toFixed(1)+'% margem · '+c.ops+' ops</div>'+
        '</div>'+
      '</div>'+
      '<div style="height:3px;background:var(--border);border-radius:2px">'+
        '<div style="height:100%;width:'+barW+'%;background:var(--gold);border-radius:2px;transition:width .5s"></div>'+
      '</div>'+
    '</div>';
  }).join('');
}


async function carregarAgenda(user) {
  var el = document.getElementById('agenda-body');
  try {
    var loginAtual = user && user.login ? user.login.trim().toLowerCase() : '';
    var r = await fetch(URL_CAL + '?action=cal_listar');
    var j = await r.json();
    var hoje = toISOLocal(new Date());

    var eventos = (j.rows||[]).filter(function(ev) {
      var dataIni = normDate(ev.DataIni||'');
      var dataFim = normDate(ev.DataFim||dataIni);
      if (hoje < dataIni || hoje > dataFim) return false;
      if (!loginAtual) return true;
      var parts = (ev.Participantes||'').split(',').map(function(s){return s.trim().toLowerCase();});
      var criador = (ev.Criador||'').trim().toLowerCase();
      return parts.indexOf(loginAtual) >= 0 || criador === loginAtual;
    }).sort(function(a,b){ return (a.HoraIni||'').localeCompare(b.HoraIni||''); });

    if (!eventos.length) {
      el.innerHTML = '<div class="side-empty">Nenhum evento hoje 🎉</div>';
      return;
    }

    document.getElementById('agenda-count').style.display = 'inline';
    document.getElementById('agenda-count').textContent = eventos.length;

    el.innerHTML = eventos.map(function(ev) {
      var tipo  = ev.Tipo||'evento';
      var color = TYPE_COLOR[tipo]||'#6B7280';
      var hora  = normHora(ev.HoraIni||'');
      var horaFim = normHora(ev.HoraFim||'');
      var horaTxt = hora ? hora+(horaFim?' – '+horaFim:'') : 'Dia inteiro';
      return '<div class="agenda-item">'+
        '<div class="agenda-hora">'+horaTxt+'</div>'+
        '<div class="agenda-dot" style="background:'+color+'"></div>'+
        '<div class="agenda-info">'+
          '<div class="agenda-titulo">'+esc(ev.Titulo||'Sem título')+'</div>'+
          '<div class="agenda-sub">'+(ev.Local?esc(ev.Local):TYPE_LABEL[tipo]||tipo)+'</div>'+
        '</div>'+
        '<span class="agenda-badge" style="background:'+color+'22;color:'+color+'">'+TYPE_LABEL[tipo]+'</span>'+
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="side-empty" style="color:var(--red)">Erro ao carregar agenda.</div>';
  }
}

// ══════════════════════════════════════════════════
//  LABORATÓRIO
// ══════════════════════════════════════════════════
async function carregarLab(user) {
  var el = document.getElementById('lab-body');
  try {
    var r = await fetch(URL_LAB);
    var j = await r.json();
    var items = (j.data || j.rows || []).slice(-5).reverse(); // últimas 5

    if (!items.length) { el.innerHTML = '<div class="side-empty">Nenhuma ideia cadastrada.</div>'; return; }

    el.innerHTML = items.map(function(item) {
      var status = item.Status||item.status||'';
      var cor = status.toLowerCase().includes('conclu') ? 'var(--green)' :
                status.toLowerCase().includes('andamento') ? 'var(--gold)' : 'var(--txt-dim)';
      return '<div class="feed-item">'+
        '<div class="feed-ico" style="background:rgba(245,184,0,.1);color:var(--gold)">💡</div>'+
        '<div class="feed-info">'+
          '<div class="feed-titulo">'+esc(item.Titulo||item.titulo||'—')+'</div>'+
          '<div class="feed-sub" style="color:'+cor+'">'+esc(status)+'</div>'+
        '</div>'+
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="side-empty" style="color:var(--red)">Erro ao carregar.</div>';
  }
}

// ══════════════════════════════════════════════════
//  HELPDESK
// ══════════════════════════════════════════════════
async function carregarHelpdesk(user) {
  var el = document.getElementById('hd-body');
  try {
    var loginAtual = user && user.nome ? user.nome.trim().toLowerCase() : '';
    var r = await fetch(URL_HELP);
    var j = await r.json();
    var items = (j.data || j.rows || []).filter(function(item) {
      if (!loginAtual) return true;
      var resp = String(item.Responsavel||item.responsavel||item.Atribuido||'').toLowerCase();
      var cria = String(item.Criador||item.criador||item.Solicitante||'').toLowerCase();
      return resp.includes(loginAtual.split(' ')[0]) || cria.includes(loginAtual.split(' ')[0]);
    }).slice(-5).reverse();

    var abertos = items.filter(function(i){
      var s = String(i.Status||i.status||'').toLowerCase();
      return !s.includes('conclu') && !s.includes('fechado') && !s.includes('resolvido');
    });

    if (abertos.length) {
      document.getElementById('hd-badge').style.display = 'inline';
      document.getElementById('hd-badge').textContent = abertos.length;
    }

    if (!items.length) { el.innerHTML = '<div class="side-empty">Nenhum chamado encontrado.</div>'; return; }

    el.innerHTML = items.map(function(item) {
      var status = item.Status||item.status||'';
      var aberto = !status.toLowerCase().includes('conclu') && !status.toLowerCase().includes('fechado');
      var cor = aberto ? 'var(--red)' : 'var(--green)';
      return '<div class="feed-item">'+
        '<div class="feed-ico" style="background:rgba(239,68,68,.1);color:var(--red)">🎧</div>'+
        '<div class="feed-info">'+
          '<div class="feed-titulo">'+esc(item.Titulo||item.titulo||item.Assunto||'Chamado')+'</div>'+
          '<div class="feed-sub" style="color:'+cor+'">'+esc(status)+'</div>'+
        '</div>'+
      '</div>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="side-empty" style="color:var(--red)">Erro ao carregar.</div>';
  }
}

function atualizarTudo() {
  var ico = document.getElementById('ico-refresh');
  ico.style.transition = 'transform 0.5s';
  ico.style.transform = 'rotate(360deg)';
  setTimeout(function(){ ico.style.transform = ''; ico.style.transition = ''; }, 500);
  var user = null;
  try { user = JSON.parse(sessionStorage.getItem('barretos_user') || localStorage.getItem('barretos_user') || '{}'); } catch(e) {}
  carregarFaturamento(user);
  carregarAgenda(user);
  carregarLab(user);
  carregarHelpdesk(user);
}
function toISOLocal(d) {
  return d.getFullYear()+'-'+padZ(d.getMonth()+1)+'-'+padZ(d.getDate());
}
function padZ(n){ return String(n).padStart(2,'0'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseBRL(v) {
  if (typeof v === 'number') return v;
  return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}
function fmtBRL(v) {
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function normDate(s) {
  if (!s) return '';
  s = String(s).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) { var p=s.split('/'); return p[2].substring(0,4)+'-'+p[1]+'-'+p[0]; }
  try { var d=new Date(s); if(!isNaN(d.getTime())) return toISOLocal(d); } catch(e){}
  return s;
}
function normHora(s) {
  if (!s) return '';
  s = String(s).trim();
  if (/^\d{1,2}:\d{2}/.test(s)) return s.substring(0,5);
  if (s.indexOf('1899')!==-1) return '';
  try { var d=new Date(s); if(!isNaN(d.getTime())) return padZ(d.getHours())+':'+padZ(d.getMinutes()); } catch(e){}
  return '';
}

<script>
/* ── SISTEMA DE TEMA (injetado) ──────────────────────────── */
(function(){
  function applyTema(t){
    document.body.classList.remove('tema-claro','tema-escuro');
    if(t==='claro') document.body.classList.add('tema-claro');
  }
  var t=localStorage.getItem('barretos_tema')||'escuro';
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){ applyTema(t); });
  } else { applyTema(t); }
  window.addEventListener('message',function(ev){
    if(ev.data && ev.data.type==='barretos_tema'){
      localStorage.setItem('barretos_tema', ev.data.tema);
      applyTema(ev.data.tema);
    }
  });
})();
/* ─────────────────────────────────────────────────────────── */
</script>
