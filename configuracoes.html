<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações — Grupo Barreto's</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#090A0D;--surface:#0F1117;--card:#151820;--border:#1E2130;
  --gold:#F5B800;--gold-dim:rgba(245,184,0,.12);--gold-b:rgba(245,184,0,.28);
  --txt:#E8EAF0;--txt-dim:#6B7280;--txt-mid:#9CA3AF;
  --green:#22C55E;--red:#EF4444;
  --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
.topbar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:10;
}
.tb-icon{font-size:18px;color:var(--gold);}
.tb-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.tb-sub{font-size:11px;color:var(--txt-dim);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.badge-admin{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-b);}
.content{padding:24px;max-width:900px;margin:0 auto;}
.section-title{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--txt-dim);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.user-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:12px;overflow:hidden;transition:border-color .15s;
}
.user-card:hover{border-color:rgba(245,184,0,.3);}
.user-card-hd{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  cursor:pointer;user-select:none;
}
.user-av{
  width:36px;height:36px;border-radius:8px;
  background:var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#111;flex-shrink:0;
}
.user-info{flex:1;}
.user-nome{font-size:13px;font-weight:600;color:var(--txt);}
.user-login{font-size:10px;color:var(--txt-dim);margin-top:2px;}
.user-perfil{
  font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:4px;
  background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-b);
}
.user-perfil.col{background:rgba(59,130,246,.1);color:#3B82F6;border-color:rgba(59,130,246,.3);}
.user-arrow{font-size:14px;color:var(--txt-dim);transition:transform .2s;}
.user-card.open .user-arrow{transform:rotate(180deg);}
.user-tools{
  display:none;padding:0 18px 16px;
  border-top:1px solid var(--border);
}
.user-card.open .user-tools{display:block;}
.tools-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:8px;margin-top:14px;
}
.tool-toggle{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border-radius:8px;
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;user-select:none;
}
.tool-toggle:hover{border-color:var(--gold-b);}
.tool-toggle.active{background:var(--gold-dim);border-color:var(--gold-b);}
.tool-toggle i{font-size:16px;color:var(--txt-dim);flex-shrink:0;}
.tool-toggle.active i{color:var(--gold);}
.tool-name{font-size:11px;font-weight:600;color:var(--txt-mid);flex:1;}
.tool-toggle.active .tool-name{color:var(--txt);}
.toggle-switch{
  width:32px;height:18px;border-radius:9px;
  background:var(--border);position:relative;flex-shrink:0;
  transition:background .15s;
}
.toggle-switch::after{
  content:'';position:absolute;width:12px;height:12px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:left .15s;
}
.tool-toggle.active .toggle-switch{background:var(--gold);}
.tool-toggle.active .toggle-switch::after{left:17px;}
.tool-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.btn-save{
  background:var(--gold);color:#111;border:none;border-radius:7px;
  padding:8px 18px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;
  cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s;
}
.btn-save:hover{opacity:.85;}
.btn-save:disabled{opacity:.4;cursor:default;}
.save-msg{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;}
.save-msg.err{color:var(--red);}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;gap:14px;flex-direction:column;}
.spinner{width:24px;height:24px;border:3px solid rgba(245,184,0,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
.loading-txt{font-size:12px;color:var(--txt-dim);}
@keyframes spin{to{transform:rotate(360deg);}}
.acesso-negado{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;text-align:center;}
.acesso-negado i{font-size:48px;color:var(--red);}
.acesso-negado h2{font-family:'Syne',sans-serif;font-size:18px;}
.acesso-negado p{font-size:13px;color:var(--txt-dim);}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-icon"><i class="ti ti-settings"></i></span>
  <div>
    <div class="tb-title">Configurações de Acesso</div>
    <div class="tb-sub">Gerencie quais ferramentas cada usuário pode acessar</div>
  </div>
  <div class="tb-right">
    <span class="badge-admin" id="badge-user">—</span>
  </div>
</div>

<div class="content">
  <!-- Acesso negado -->
  <div class="acesso-negado" id="acesso-negado" style="display:none">
    <i class="ti ti-lock"></i>
    <h2>Acesso Restrito</h2>
    <p>Esta área é exclusiva para administradores do sistema.</p>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" id="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-txt">Carregando usuários...</div>
  </div>

  <!-- Lista de usuários -->
  <div id="users-list" style="display:none">
    <div class="section-title"><i class="ti ti-users" style="font-size:14px"></i> Usuários e Permissões</div>
    <div id="users-container"></div>
  </div>
</div>

<script>
const TOOLS_LIST = [
  { key:"dashboard", label:"Dashboard",             icon:"ti-layout-dashboard", cat:"" },
  { key:"cotacao",   label:"Cotação Comercial",     icon:"ti-calculator",       cat:"Comercial" },
  { key:"relatorio", label:"Relatório de Vendedor", icon:"ti-chart-bar",        cat:"Comercial" },
  { key:"frota",        label:"Gestão da Frota",   icon:"ti-truck",    cat:"Operacional" },
  { key:"kanban_pin",   label:"Pinheiro",          icon:"ti-columns",  cat:"Operacional" },
  { key:"kanban_inf",   label:"Infra",             icon:"ti-columns",  cat:"Operacional" },
  { key:"kanban_bar",   label:"Barreto's",         icon:"ti-columns",  cat:"Operacional" },
  { key:"kanban_gon",   label:"Gonçalves",         icon:"ti-columns",  cat:"Operacional" },
  { key:"ideias",    label:"Laboratório de Ideias", icon:"ti-bulb",             cat:"Melhoria" },
  { key:"config",    label:"Configurações",         icon:"ti-settings",         cat:"Admin" },
];

// Estado local de permissões (login -> Set de ferramentas)
let permissoes = {};
let usuarios   = [];
let loginUrl   = localStorage.getItem("login_webapp_url") || localStorage.getItem("barretos_usuarios_url") || "";

// ── Verifica acesso ──
document.addEventListener("DOMContentLoaded", function(){
  var raw = sessionStorage.getItem("barretos_user") || localStorage.getItem("barretos_user");
  var user = null;
  try { user = JSON.parse(raw); } catch(e){}

  if (!user || user.perfil !== "gestor") {
    document.getElementById("loading-wrap").style.display = "none";
    document.getElementById("acesso-negado").style.display = "flex";
    document.getElementById("badge-user").textContent = user ? user.nome : "Sem sessão";
    return;
  }

  document.getElementById("badge-user").textContent = user.nome;
  carregarUsuarios();
});

// ── Carrega usuários da planilha ──
async function carregarUsuarios(){
  if (!loginUrl) {
    document.getElementById("loading-wrap").innerHTML = '<div style="text-align:center;color:var(--txt-dim);font-size:13px;padding:40px"><i class="ti ti-plug-off" style="font-size:32px;display:block;margin-bottom:12px;color:var(--red)"></i>URL do Apps Script não configurada.<br>Configure no login e recarregue.</div>';
    return;
  }
  try {
    const res  = await fetch(loginUrl + "?action=list_users");
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    usuarios = Array.isArray(json.users) ? json.users : [];
    if (usuarios.length === 0) throw new Error('Nenhum usuário encontrado na planilha USUARIOS');
    // Carrega permissões salvas
    const resPerm = await fetch(loginUrl + "?action=get_permissoes");
    const jsonPerm = await resPerm.json();
    if (jsonPerm.success && jsonPerm.permissoes) {
      permissoes = jsonPerm.permissoes;
    }
    // Para usuários sem permissões salvas, define acesso total como padrão
    (usuarios || []).forEach(u => {
      if (u && u.login && !permissoes[u.login.toLowerCase().trim()]) {
        permissoes[u.login.toLowerCase().trim()] = TOOLS_LIST.map(t => t.key);
      }
    });
        renderUsuarios();
  } catch(e) {
    document.getElementById("loading-wrap").innerHTML = '<div style="text-align:center;color:var(--red);font-size:13px;padding:40px"><i class="ti ti-alert-circle" style="font-size:32px;display:block;margin-bottom:12px"></i>Erro ao carregar: ' + e.message + '</div>';
  }
}

// ── Renderiza lista de usuários ──
function renderUsuarios(){
  document.getElementById("loading-wrap").style.display = "none";
  document.getElementById("users-list").style.display = "block";
  const container = document.getElementById("users-container");
  container.innerHTML = "";

  usuarios.forEach(function(u){
    const login   = u.login.toLowerCase().trim();
    const perms   = (permissoes[login] !== undefined) ? permissoes[login] : TOOLS_LIST.map(t => t.key);
    const isGestor = u.perfil === "gestor";
    const inicial = (u.nome || "?")[0].toUpperCase();

    var toolsHTML = TOOLS_LIST.map(function(t){
      const ativo = perms.includes(t.key);
      return '<div class="tool-toggle ' + (ativo?"active":"") + '" '
           + 'onclick="toggleTool(\'' + login + '\',\'' + t.key + '\')" '
           + 'id="tt-' + login.replace(/\s/g,"_") + '-' + t.key + '">'
           + '<i class="ti ' + t.icon + '"></i>'
           + '<span class="tool-name">' + t.label + (t.cat ? ' <span style="opacity:.5;font-size:9px">'+t.cat+'</span>' : "") + '</span>'
           + '<div class="toggle-switch"></div>'
           + '</div>';
    }).join("");

    const card = document.createElement("div");
    card.className = "user-card";
    card.id = "card-" + login.replace(/\s/g,"_");
    card.innerHTML = '<div class="user-card-hd" onclick="toggleCard(\'' + login.replace(/\s/g,"_") + '\')">'
      + '<div class="user-av">' + inicial + '</div>'
      + '<div class="user-info"><div class="user-nome">' + u.nome + '</div>'
      + '<div class="user-login">' + login + '</div></div>'
      + '<span class="user-perfil ' + (isGestor?"":"col") + '">' + (isGestor?"Gestor":"Colaborador") + '</span>'
      + '<i class="ti ti-chevron-down user-arrow"></i>'
      + '</div>'
      + '<div class="user-tools">'
      + '<div class="tools-grid">' + toolsHTML + '</div>'
      + '<div class="tool-actions">'
      + '<span class="save-msg" id="msg-' + login.replace(/\s/g,"_") + '" style="display:none"></span>'
      + '<button class="btn-save" onclick="salvarPermissoes(\'' + login + '\')">'
      + '<i class="ti ti-device-floppy" style="font-size:13px"></i> Salvar permissões</button>'
      + '</div></div>';
    container.appendChild(card);
  });
}

function toggleCard(loginId){
  var card = document.getElementById("card-" + loginId);
  card.classList.toggle("open");
}

function toggleTool(login, toolKey){
  login = login.toLowerCase().trim();
  if (!permissoes[login]) permissoes[login] = [];
  var idx = permissoes[login].indexOf(toolKey);
  if (idx >= 0) permissoes[login].splice(idx,1);
  else permissoes[login].push(toolKey);
  // Update UI
  var elId = "tt-" + login.replace(/\s/g,"_") + "-" + toolKey;
  var el   = document.getElementById(elId);
  if (el) el.classList.toggle("active", permissoes[login].includes(toolKey));
}

async function salvarPermissoes(login){
  login = login.toLowerCase().trim();
  var loginId = login.replace(/\s/g,"_");
  var btn  = document.querySelector("#card-" + loginId + " .btn-save");
  var msgEl = document.getElementById("msg-" + loginId);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px"></span> Salvando…';
  msgEl.style.display = "none";
  try {
    const res  = await fetch(loginUrl, {
      method: "POST",
      body: JSON.stringify({ action:"set_permissoes", login:login, ferramentas:permissoes[login] })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
        msgEl.innerHTML = '<i class="ti ti-circle-check"></i> Salvo com sucesso!';
    msgEl.className = "save-msg";
    msgEl.style.display = "flex";
    setTimeout(() => { msgEl.style.display="none"; }, 3000);
  } catch(e) {
    msgEl.textContent = "Erro: " + e.message;
    msgEl.className = "save-msg err";
    msgEl.style.display = "flex";
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-device-floppy" style="font-size:13px"></i> Salvar permissões';
}
</script>
</body>
</html>
