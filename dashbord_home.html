<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — Grupo Barreto's</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#090A0D;--surface:#0F1117;--card:#151820;--border:#1E2130;
  --gold:#F5B800;--gold2:#FFD54F;--txt:#E8EAF0;--txt-dim:#6B7280;--txt-mid:#9CA3AF;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--orange:#F97316;
  --teal:#14B8A6;--purple:#A855F7;--r:10px;
  --sidebar:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}

/* ─── SIDEBAR ─── */




.sb-user:hover{background:var(--card)}






.sb-item:hover{background:var(--card);color:var(--txt);border-left-color:var(--border)}
.sb-item.active{background:rgba(245,184,0,.06);color:var(--gold);border-left-color:var(--gold)}
.sb-item i{font-size:15px;flex-shrink:0}



.sb-conn:hover{border-color:var(--gold)}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.conn-dot.on{background:var(--green)}
.conn-label{font-size:10px;color:var(--txt-dim);flex:1}

/* ─── MAIN ─── */
.main{width:100%;display:flex;flex-direction:column;overflow:hidden}

/* ─── TOPBAR ─── */
.topbar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;
}
.tb-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--txt)}
.tb-sub{font-size:11px;color:var(--txt-dim)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.mes-select{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--txt);font-size:12px;padding:5px 10px;outline:none;cursor:pointer}
.mes-select:focus{border-color:var(--gold)}
.refresh-btn{
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:var(--gold);color:#111;border:none;border-radius:7px;
  font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s;
}
.refresh-btn:hover{opacity:.85}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}

/* ─── CONTENT ─── */
.content{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:20px}

/* ─── TOTAL KPIs ─── */
.total-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.total-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;position:relative;overflow:hidden;
}
.total-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent,var(--gold));
}
.total-card.green{--accent:var(--green)}
.total-card.blue{--accent:var(--blue)}
.total-card.purple{--accent:var(--purple)}
.tc-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:6px}
.tc-val{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;letter-spacing:-.02em}
.tc-val.gold{color:var(--gold)}
.tc-val.green{color:var(--green)}
.tc-delta{font-size:10px;color:var(--txt-dim);margin-top:3px}

/* ─── COMPANY GRID ─── */
.section-hd{display:flex;align-items:center;gap:10px}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txt-dim)}
.section-line{flex:1;height:1px;background:var(--border)}
.empresa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.empresa-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;transition:border-color .15s,transform .12s;
}
.empresa-card:hover{border-color:var(--accent,var(--gold));transform:translateY(-1px)}
.ec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ec-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:.02em}
.ec-badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.ec-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ec-metric{background:var(--surface);border-radius:7px;padding:10px 12px}
.ec-m-lbl{font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:3px}
.ec-m-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.ec-m-val.green{color:var(--green)}
.ec-m-val.red{color:var(--red)}
.ec-bar{margin-top:12px}
.ec-bar-row{display:flex;justify-content:space-between;font-size:9px;color:var(--txt-dim);margin-bottom:4px}
.ec-bar-track{height:3px;background:var(--border);border-radius:2px}
.ec-bar-fill{height:3px;border-radius:2px;transition:width .5s ease}

/* ─── FROTA SECTION ─── */
.frota-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.frota-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.fc-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:5px}
.fc-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--txt)}
.fc-sub{font-size:10px;color:var(--txt-dim);margin-top:2px}
.frota-connect{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:20px;background:var(--card);border:1px dashed var(--border);
  border-radius:var(--r);color:var(--txt-dim);font-size:12px;cursor:pointer;
  transition:border-color .15s;
}
.frota-connect:hover{border-color:var(--gold);color:var(--gold)}

/* ─── EMPTY / LOADING ─── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-msg{text-align:center;padding:40px;color:var(--txt-dim);font-size:12px}

/* ─── MODAL CONFIG ─── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;width:420px;max-width:95vw}
.modal-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:5px}
.fi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--gold)}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.btn-g{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--txt-dim);font-size:12px;cursor:pointer;transition:all .15s}
.btn-g:hover{border-color:var(--txt-mid);color:var(--txt)}
.btn-p{padding:7px 18px;background:var(--gold);border:none;border-radius:7px;color:#111;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-p:hover{opacity:.88}
.help{font-size:11px;color:var(--txt-dim);line-height:1.5;margin-top:6px}



.hide-margem .tc-margem,.hide-margem .ec-m-lbl,.hide-margem .ec-m-val,.hide-margem [data-margem]{ display:none !important; }
</style>
</head>
<body>

<!-- MAIN -->
<div class="main" style="width:100%;margin-left:0;">
  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="tb-title">Dashboard Executivo</div>
      <div class="tb-sub" id="tb-sub">Carregando...</div>
    </div>
    <div class="tb-right">
      <select class="mes-select" id="f-mes" onchange="applyFilter()">
        <option value="">Todos os meses</option>
      </select>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <i class="ti ti-refresh" style="font-size:12px"></i> Atualizar
      </button>
      <button class="refresh-btn" onclick="openConfig()" title="Configurar Apps Script" style="background:transparent;border:1px solid var(--border);gap:5px;">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-label" style="font-size:10px;color:var(--txt-dim)">Configurar</span>
        <i class="ti ti-settings" style="font-size:12px"></i>
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="empty-msg"><span class="spinner"></span><br><br>Configure a URL do Apps Script para começar</div>
  </div>
</div>

<!-- CONFIG MODAL -->
<div id="modal-cfg" class="modal-ov" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-link" style="color:var(--gold);margin-right:8px"></i>Configurar Conexão</div>
    <div class="fg">
      <label>URL do Apps Script (Relatório de Fretes)</label>
      <input class="fi" id="cfg-url" placeholder="https://script.google.com/macros/s/...">
      <p class="help">Mesma URL usada no Relatório de Fretes.</p>
    </div>
    <div class="mf">
      <button class="btn-g" onclick="document.getElementById('modal-cfg').classList.remove('open')">Cancelar</button>
      <button class="btn-p" onclick="saveConfig()">Salvar</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
var WEBAPP_URL=localStorage.getItem('barretos_jira_url')||'';
let rawData = [];
let filtered = [];

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */

/* ── PERMISSÕES DE ACESSO ─────────────────── */
function getPerfil(){
  return localStorage.getItem('barretos_perfil')||sessionStorage.getItem('barretos_perfil')||'';
}
function getEmpresasPermitidas(){
  var perfil=getPerfil();
  if(perfil==='gestor') return null; // null = todas
  var cached=sessionStorage.getItem('barretos_perms_'+(localStorage.getItem('barretos_login')||''));
  var ferr=[];
  try{ ferr=cached?JSON.parse(cached):[]; }catch(e){}
  var MAP={'kanban_inf':'INFRA','kanban_bar':"BARRETO'S",'kanban_gon':'GONCALVES','kanban_pin':'PINHEIRO'};
  var allowed=[];
  Object.keys(MAP).forEach(function(k){ if(ferr.indexOf(k)!==-1) allowed.push(MAP[k]); });
  return allowed.length ? allowed : null;
}
function isGestor(){ return getPerfil()==='gestor'; }

document.addEventListener('DOMContentLoaded', () => {
  if (WEBAPP_URL) { setConn(true); loadData(); }
  if (!isGestor()) document.body.classList.add('hide-margem');
  else { setConn(false); setTimeout(openConfig, 500); }
});

/* ════════════════════════════════════
   CONFIG
════════════════════════════════════ */
function openConfig() {
  document.getElementById('cfg-url').value = WEBAPP_URL;
  document.getElementById('modal-cfg').classList.add('open');
}
function saveConfig() {
  const u = document.getElementById('cfg-url').value.trim();
  if (!u) return alert('Informe a URL');
  WEBAPP_URL = u;
  localStorage.setItem('barretos_jira_url',u);localStorage.setItem('login_webapp_url',u);
  document.getElementById('modal-cfg').classList.remove('open');
  setConn(true);
  loadData();
}
function setConn(on) {
  document.getElementById('conn-dot').className = 'conn-dot' + (on ? ' on' : '');
  document.getElementById('conn-label').textContent = on ? 'Planilha conectada' : 'Clique para configurar';
}

/* ════════════════════════════════════
   DATA
════════════════════════════════════ */
async function loadData() {
  if (!WEBAPP_URL) { openConfig(); return; }
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  try {
    const r = await fetch(WEBAPP_URL);
    const j = await r.json();
    if (j.success && j.data) {
      rawData = j.data;
      populateMes();
      applyFilter();
      setConn(true);
    }
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-msg"><i class="ti ti-wifi-off" style="font-size:24px;display:block;margin-bottom:8px"></i>Erro de conexão. Verifique a URL.</div>';
  }
  btn.innerHTML = '<i class="ti ti-refresh" style="font-size:12px"></i> Atualizar';
  btn.disabled = false;
}

function populateMes() {
  const meses = [...new Set(rawData.map(r => r['Mes'] || '').filter(Boolean))].sort();
  const sel = document.getElementById('f-mes');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos os meses</option>' +
    meses.map(m => `<option${m===cur?' selected':''}>${m}</option>`).join('');
  // Auto-select last month
  if (!cur && meses.length) sel.value = meses[meses.length - 1];
}

function applyFilter() {
  // Filter by allowed companies for colaborador
  var _allowed = getEmpresasPermitidas();
  if (_allowed) {
    rawData = rawData.filter(function(r){ return _allowed.indexOf(String(r['Origem']||'').trim()) !== -1; });
  }
  const mes = document.getElementById('f-mes').value;
  filtered = mes ? rawData.filter(r => (r['Mes'] || '') === mes) : rawData;
  const mesLabel = mes || 'todos os meses';
  document.getElementById('tb-sub').textContent =
    filtered.length + ' fretes · ' + mesLabel;
  renderDashboard(filtered);
}

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
const fmtBRL = v => (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
const fmtK   = v => v>=1000000 ? 'R$ '+(v/1000000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'M'
                  : v>=1000 ? 'R$ '+(v/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k'
                  : fmtBRL(v);
function parseBRL(s) {
  if (!s) return 0;
  if (typeof s === 'number') return s;
  let v = String(s).replace(/R\$\s*/g,'').trim();
  if (v.includes(',')) v = v.replace(/\./g,'').replace(',','.');
  return parseFloat(v) || 0;
}

const EMPRESA_CFG = {
  'INFRA':       { color:'var(--teal)',   bg:'rgba(20,184,166,.08)',  badgeBg:'rgba(20,184,166,.15)',  badgeColor:'var(--teal)'  },
  "BARRETO'S":   { color:'var(--gold)',   bg:'rgba(245,184,0,.08)',   badgeBg:'rgba(245,184,0,.15)',   badgeColor:'var(--gold)'  },
  'GONCALVES':   { color:'var(--blue)',   bg:'rgba(59,130,246,.08)',  badgeBg:'rgba(59,130,246,.15)',  badgeColor:'var(--blue)'  },
  'PINHEIRO':    { color:'var(--orange)', bg:'rgba(249,115,22,.08)',  badgeBg:'rgba(249,115,22,.15)',  badgeColor:'var(--orange)'}
};
function empresaCfg(nome) {
  return EMPRESA_CFG[String(nome||'').toUpperCase()] || EMPRESA_CFG['INFRA'];
}

/* ════════════════════════════════════
   RENDER
════════════════════════════════════ */
function renderDashboard(rows) {
  // Aggregate totals
  const totFat  = rows.reduce((s,r) => s + parseBRL(r['Frete Cobrado']), 0);
  const totCust = rows.reduce((s,r) => s + parseBRL(r['Custo Operacional']), 0);
  const totIcms = rows.reduce((s,r) => s + parseBRL(r['ICMS']), 0);
  const totMarg = totFat - totCust - totIcms;
  const totQtd  = rows.length;

  // Aggregate by company
  const byEmp = {};
  rows.forEach(r => {
    const emp = String(r['Origem'] || 'INFRA').trim();
    if (!byEmp[emp]) byEmp[emp] = { fat:0, custo:0, icms:0, qtd:0 };
    byEmp[emp].fat  += parseBRL(r['Frete Cobrado']);
    byEmp[emp].custo+= parseBRL(r['Custo Operacional']);
    byEmp[emp].icms += parseBRL(r['ICMS']);
    byEmp[emp].qtd++;
  });

  const empresas = Object.entries(byEmp)
    .sort((a,b) => b[1].fat - a[1].fat);

  const margPct = totFat ? (totMarg/totFat*100).toFixed(1) : '0.0';

  document.getElementById('content').innerHTML = `
    <!-- TOTAIS -->
    <div class="total-strip">
      <div class="total-card">
        <div class="tc-lbl">Faturamento Total</div>
        <div class="tc-val gold">${fmtK(totFat)}</div>
        <div class="tc-delta">${totQtd} frete${totQtd!==1?'s':''} no período</div>
      </div>
      <div class="total-card green">
        <div class="tc-lbl">Margem Líquida</div><!-- margem-card -->
        <div class="tc-val green">${fmtK(totMarg)}</div>
        <div class="tc-delta">${margPct}% sobre faturamento</div>
      </div>
      <div class="total-card blue">
        <div class="tc-lbl">Custo Operacional</div>
        <div class="tc-val" style="color:var(--blue)">${fmtK(totCust)}</div>
        <div class="tc-delta">${totFat?((totCust/totFat)*100).toFixed(1):0}% do faturamento</div>
      </div>
      <div class="total-card purple">
        <div class="tc-lbl">ICMS</div>
        <div class="tc-val" style="color:var(--purple)">${fmtK(totIcms)}</div>
        <div class="tc-delta">12% aplicado</div>
      </div>
    </div>

    <!-- EMPRESAS -->
    <div>
      <div class="section-hd"><span class="section-title">Por Empresa</span><div class="section-line"></div></div>
      <div style="margin-top:12px" id="emp-grid">
        ${empresas.length ? renderEmpresas(empresas, totFat) :
          '<div class="empty-msg">Nenhum dado disponível para o período</div>'}
      </div>
    </div>

    <!-- FROTA -->
    <div>
      <div class="section-hd"><span class="section-title">Controle de Frota</span><div class="section-line"></div></div>
      <div style="margin-top:12px">
        <div class="frota-connect" onclick="window.open('frota.html','_blank')">
          <i class="ti ti-truck" style="font-size:18px"></i>
          <span>Abrir Controle de Frota</span>
          <i class="ti ti-external-link" style="font-size:13px"></i>
        </div>
      </div>
    </div>
  `;
}

function renderEmpresas(empresas, totFat) {
  return `<div class="empresa-grid">` +
    empresas.map(([nome, m]) => {
      const cfg  = empresaCfg(nome);
      const marg = m.fat - m.custo - m.icms;
      const margPct = m.fat ? (marg/m.fat*100).toFixed(1) : '0.0';
      const pct  = totFat ? (m.fat/totFat*100).toFixed(1) : '0.0';
      return `
        <div class="empresa-card" style="--accent:${cfg.color};border-color:var(--border)">
          <div class="ec-header">
            <div class="ec-name" style="color:${cfg.color}">${nome}</div>
            <span class="ec-badge" style="background:${cfg.badgeBg};color:${cfg.badgeColor}">${m.qtd} frete${m.qtd!==1?'s':''}</span>
          </div>
          <div class="ec-metrics">
            <div class="ec-metric">
              <div class="ec-m-lbl" data-margem="1">Faturamento</div>
              <div class="ec-m-val" data-margem="1" class="ec-m-val" style="color:${cfg.color}">${fmtK(m.fat)}</div>
            </div>
            <div class="ec-metric">
              <div class="ec-m-lbl" data-margem="1">Margem Líq.</div>
              <div class="ec-m-val" data-margem="1" class="ec-m-val ${marg>=0?'green':'red'}">${fmtK(marg)}</div>
            </div>
            <div class="ec-metric">
              <div class="ec-m-lbl" data-margem="1">% Margem</div>
              <div class="ec-m-val" data-margem="1" class="ec-m-val ${parseFloat(margPct)>=20?'green':parseFloat(margPct)>=0?'':'red'}">${margPct}%</div>
            </div>
          </div>
          <div class="ec-bar">
            <div class="ec-bar-row">
              <span>Participação no faturamento geral</span><span>${pct}%</span>
            </div>
            <div class="ec-bar-track">
              <div class="ec-bar-fill" style="width:${pct}%;background:${cfg.color}"></div>
            </div>
          </div>
        </div>`;
    }).join('') + `</div>`;
}
</script>

</body>
</html>
